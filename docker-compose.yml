services:
  db:
    image: postgres:16-alpine
    container_name: volna_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-volna}
      POSTGRES_USER: ${POSTGRES_USER:-volna}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-volna_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-volna} -d ${POSTGRES_DB:-volna}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: volna_backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_media:/app/media
      - backend_static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:22-alpine
    container_name: volna_frontend
    restart: unless-stopped
    working_dir: /app
    env_file:
      - .env
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_media:
  backend_static:
  frontend_node_modules:
